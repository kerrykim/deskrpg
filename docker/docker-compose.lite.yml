# docker/docker-compose.lite.yml — SQLite mode (no external DB needed)
# Lightweight single-container deployment. Ideal for self-hosting without PostgreSQL.
services:
  deskrpg-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: deskrpg-app
    restart: unless-stopped
    ports:
      - "3102:3000"
      - "3103:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../public/assets:/app/public/assets
      - deskrpg-data:/app/data
    environment:
      DB_TYPE: sqlite
      SQLITE_PATH: /app/data/deskrpg.db
      JWT_SECRET: ${JWT_SECRET}
      OPENCLAW_WS_URL: ${OPENCLAW_WS_URL:-ws://156.67.219.3:18800}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN}

volumes:
  deskrpg-data:
