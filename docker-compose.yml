# docker-compose.yml
services:
  deskrpg-db:
    image: postgres:16-alpine
    container_name: deskrpg-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: deskrpg
      POSTGRES_USER: deskrpg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deskrpg_dev_pw}
    ports:
      - "5437:5432"
    volumes:
      - deskrpg-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deskrpg -d deskrpg"]
      interval: 5s
      timeout: 5s
      retries: 5

  deskrpg-app:
    build: .
    container_name: deskrpg-app
    restart: unless-stopped
    ports:
      - "3102:3000"
      - "3103:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./public/assets:/app/public/assets
    environment:
      DATABASE_URL: postgresql://deskrpg:${POSTGRES_PASSWORD:-deskrpg_dev_pw}@deskrpg-db:5432/deskrpg
      JWT_SECRET: ${JWT_SECRET}
      OPENCLAW_WS_URL: ${OPENCLAW_WS_URL:-ws://156.67.219.3:18800}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN}
    depends_on:
      deskrpg-db:
        condition: service_healthy

  # SSH tunnel proxy: creates local TCP endpoint for Cloudflare Tunnel SSH
  # DeskRPG's ssh2 library connects to this local port instead of remote SSH directly
  ssh-tunnel-proxy:
    image: cloudflare/cloudflared:latest
    container_name: deskrpg-ssh-proxy
    restart: unless-stopped
    command: access tcp --hostname ssh-oc-test.dantelabs.pro --url 0.0.0.0:2222 --no-tls-verify
    expose:
      - "2222"

volumes:
  deskrpg-pgdata:
