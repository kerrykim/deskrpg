name: Deploy to MiniPC

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to MiniPC
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: dante
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/dante/projects/deskrpg
            git pull origin main
            docker compose build deskrpg-app
            docker compose up -d
            sleep 5
            curl -sf http://localhost:3102/api/health || echo "Health check failed"
